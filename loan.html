<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 20px; padding: 24px; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#111827] py-5 px-6 flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <span onclick="window.location.href='index.html'" class="cursor-pointer text-3xl">←</span>
            <h1 class="text-2xl font-bold">TradexaX</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <h1 class="text-4xl font-bold mb-8">Loan Request</h1>

        <div class="card">
            <h2 class="text-2xl font-semibold mb-6">Apply for Loan</h2>
            <div class="space-y-6">
                <input id="loan-amount" type="number" placeholder="Loan Amount (USDT)" class="w-full bg-slate-800 p-6 rounded-2xl text-2xl">
                <select id="loan-period" class="w-full bg-slate-800 p-6 rounded-2xl text-lg">
                    <option value="7">7 Days</option>
                    <option value="14">14 Days</option>
                    <option value="30" selected>30 Days</option>
                </select>
                <textarea id="loan-reason" placeholder="Purpose of Loan (optional)" class="w-full bg-slate-800 p-6 rounded-2xl h-32"></textarea>
                <button onclick="submitLoan()" class="w-full py-6 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-xl font-bold">
                    Submit Loan Request
                </button>
            </div>
        </div>

        <div class="card mt-8">
            <h3 class="font-semibold mb-6">My Loans</h3>
            <div id="loan-list" class="space-y-4"></div>
        </div>
    </main>

    <script>
        function submitLoan() {
            const amount = document.getElementById('loan-amount').value;
            if (!amount) return alert("Enter loan amount");

            let loans = JSON.parse(localStorage.getItem('loans') || '[]');
            loans.push({
                id: Date.now(),
                amount: parseFloat(amount),
                period: document.getElementById('loan-period').value + " days",
                reason: document.getElementById('loan-reason').value,
                status: "Pending"
            });
            localStorage.setItem('loans', JSON.stringify(loans));

            alert(`✅ Loan request of $${amount} USDT submitted to Admin.`);
            loadLoans();
        }

        function loadLoans() {
            const loans = JSON.parse(localStorage.getItem('loans') || '[]');
            const container = document.getElementById('loan-list');
            container.innerHTML = loans.length ? loans.map(l => `
                <div class="bg-[#111827] p-5 rounded-2xl flex justify-between items-center">
                    <div>
                        <strong>$${l.amount} USDT</strong> - ${l.period}
                        <p class="text-sm text-slate-400">${l.reason || 'No reason provided'}</p>
                    </div>
                    <div class="text-amber-400">${l.status}</div>
                </div>
            `).join('') : '<p class="text-slate-400">No loans yet.</p>';
        }

        window.onload = loadLoans;
    </script>
</body>
</html>
