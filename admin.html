<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 16px; padding: 24px; }
        .tab-active { background: #3b82f6; color: white; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-10 text-center">ADMIN DASHBOARD</h1>
        <div class="bg-[#1e2937] p-1 rounded-3xl flex mb-8 overflow-x-auto">
            <button onclick="switchTab(0)" class="tab tab-active flex-1 py-4 rounded-3xl text-lg font-medium">Dashboard</button>
            <button onclick="switchTab(1)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Users</button>
            <button onclick="switchTab(2)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Wallet</button>
            <button onclick="switchTab(3)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Loans</button>
            <button onclick="switchTab(4)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Tickets</button>
        </div>
        <div id="tab0" class="card">
            <h2 class="text-2xl font-semibold mb-6">Force Winning</h2>
            <label class="flex items-center gap-4">
                <input id="force-win" type="checkbox" onchange="toggleForceWin()">
                <span id="force-win-label">OFF</span>
            </label>
        </div>
        <div id="tab1" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Users</h2>
            <div id="users-list" class="space-y-4"></div>
        </div>
        <div id="tab2" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Main Wallets</h2>
            <!-- Wallet fields here -->
            <button onclick="saveWallets()" class="mt-8 w-full py-4 bg-blue-600 rounded-3xl">Save All Wallets</button>
        </div>
        <div id="tab3" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Loans</h2>
            <div id="loans-list" class="space-y-4"></div>
        </div>
        <div id="tab4" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Tickets</h2>
            <div id="tickets-list" class="space-y-4"></div>
        </div>
    </div>
    <script>
        function switchTab(n) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
            if (n === 1) loadUsers();
            if (n === 3) loadLoans();
            if (n === 4) loadTickets();
        }
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const container = document.getElementById('users-list');
            container.innerHTML = users.length ? users.map(u => `
                <div class="bg-slate-800 p-6 rounded-3xl">
                    <div class="flex justify-between">
                        <div>
                            <div class="font-semibold">User ${u.id}</div>
                            <div class="text-sm text-slate-400">${u.email || ''}</div>
                        </div>
                        <div class="text-right">
                            <div>Balance: $${u.balance || 0}</div>
                            <button onclick="updateBalance('${u.id}')" class="mt-4 px-6 py-2 bg-blue-600 rounded-xl">Edit Balance</button>
                        </div>
                    </div>
                </div>
            `).join('') : '<p class="text-slate-400">No users yet.</p>';
        }
        function updateBalance(userId) {
            const balance = prompt("New balance for user " + userId + ":");
            if (balance !== null) {
                let users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.id == userId);
                if (user) user.balance = parseFloat(balance);
                localStorage.setItem('users', JSON.stringify(users));
                alert("Balance updated.");
                loadUsers();
            }
        }
        function toggleForceWin() {
            const isOn = document.getElementById('force-win').checked;
            localStorage.setItem('forceWin', isOn);
            document.getElementById('force-win-label').textContent = isOn ? "ON" : "OFF";
        }
        function saveWallets() {
            alert("Wallets saved.");
        }
        function loadLoans() {
            const loans = JSON.parse(localStorage.getItem('loans')) || [];
            const container = document.getElementById('loans-list');
            container.innerHTML = loans.length ? loans.map(l => `<div class="bg-slate-800 p-6 rounded-3xl">Loan request from user ${l.userId}</div>`).join('') : '<p>No loan requests yet.</p>';
        }
        function loadTickets() {
            const tickets = JSON.parse(localStorage.getItem('tickets')) || [];
            const container = document.getElementById('tickets-list');
            container.innerHTML = tickets.length ? tickets.map(t => `<div class="bg-slate-800 p-6 rounded-3xl">Ticket from user ${t.userId}</div>`).join('') : '<p>No tickets yet.</p>';
        }
        window.onload = () => {
            const force = localStorage.getItem('forceWin') === 'true';
            document.getElementById('force-win').checked = force;
            document.getElementById('force-win-label').textContent = force ? "ON" : "OFF";
            loadUsers();
        };
    </script>
</body>
</html>
