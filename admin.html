<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 16px; padding: 24px; }
        .tab-active { background: #3b82f6; color: white; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-10 text-center">ADMIN DASHBOARD</h1>
        <!-- Tabs -->
        <div class="bg-[#1e2937] p-1 rounded-3xl flex mb-8 overflow-x-auto">
            <button onclick="switchTab(0)" class="tab tab-active flex-1 py-4 rounded-3xl text-lg font-medium">Dashboard</button>
            <button onclick="switchTab(1)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Users</button>
            <button onclick="switchTab(2)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Wallet</button>
            <button onclick="switchTab(3)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Loans</button>
            <button onclick="switchTab(4)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Tickets</button>
        </div>
        <!-- Dashboard -->
        <div id="tab0" class="card">
            <h2 class="text-2xl font-semibold mb-6">Force Winning</h2>
            <label class="flex items-center gap-4">
                <input id="force-win" type="checkbox" onchange="toggleForceWin()">
                <span id="force-win-label">OFF</span>
            </label>
        </div>
        <!-- Users -->
        <div id="tab1" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Users</h2>
            <div id="users-list" class="space-y-4"></div>
        </div>
        <!-- Wallet -->
        <div id="tab2" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Main Wallets (Deposit Addresses)</h2>
            <div class="space-y-8">
                <div>
                    <h3 class="font-semibold mb-2">USDT</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>TRC20</label>
                            <input id="usdt-trc" type="text" value="TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR" class="w-full bg-slate-900 p-4 rounded-2xl">
                        </div>
                        <div>
                            <label>ERC20</label>
                            <input id="usdt-erc" type="text" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1" class="w-full bg-slate-900 p-4 rounded-2xl">
                        </div>
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold mb-2">USDC</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>TRC20</label>
                            <input id="usdc-trc" type="text" value="TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR" class="w-full bg-slate-900 p-4 rounded-2xl">
                        </div>
                        <div>
                            <label>ERC20</label>
                            <input id="usdc-erc" type="text" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1" class="w-full bg-slate-900 p-4 rounded-2xl">
                        </div>
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold mb-2">BTC</h3>
                    <div>
                        <label>Mainnet</label>
                        <input id="btc-main" type="text" value="14CDc1TVGMsnAcXFCYXVSPjLNqe4vDMuBp" class="w-full bg-slate-900 p-4 rounded-2xl">
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold mb-2">ETH</h3>
                    <div>
                        <label>ERC20</label>
                        <input id="eth-erc" type="text" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1" class="w-full bg-slate-900 p-4 rounded-2xl">
                    </div>
                </div>
            </div>
            <button onclick="saveWallets()" class="mt-8 w-full py-4 bg-blue-600 rounded-3xl">Save All Wallets</button>
        </div>
        <!-- Loans -->
        <div id="tab3" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Loans</h2>
            <div id="loans-list" class="space-y-4"></div>
        </div>
        <!-- Tickets -->
        <div id="tab4" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Tickets</h2>
            <div id="tickets-list" class="space-y-4"></div>
        </div>
    </div>
    <script>
        function switchTab(n) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
            if (n === 1) loadUsers();
            if (n === 3) loadLoans();
            if (n === 4) loadTickets();
        }
        function toggleForceWin() {
            const isOn = document.getElementById('force-win').checked;
            localStorage.setItem('forceWin', isOn);
            document.getElementById('force-win-label').textContent = isOn ? "ON" : "OFF";
        }
        function updateBalance(userId) {
            const balance = prompt("New balance for user " + userId + ":");
            if (balance !== null) {
                let users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.id == userId);
                if (user) user.balance = parseFloat(balance);
                localStorage.setItem('users', JSON.stringify(users));
                alert("Balance updated.");
                loadUsers();
            }
        }
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const container = document.getElementById('users-list');
            container.innerHTML = users.length ? users.map(u => `
                <div class="bg-slate-800 p-6 rounded-3xl">
                    <div class="flex justify-between">
                        <div>
                            <div class="font-semibold">User ${u.id}</div>
                            <div class="text-sm text-slate-400">${u.email}</div>
                        </div>
                        <div class="text-right">
                            <div>Balance: $${u.balance || 0}</div>
                            <button onclick="updateBalance('${u.id}')" class="mt-4 px-6 py-2 bg-blue-600 rounded-xl">Edit Balance</button>
                        </div>
                    </div>
                </div>
            `).join('') : '<p class="text-slate-400">No users yet.</p>';
        }
        function saveWallets() {
            localStorage.setItem('walletUSDT_TRC20', document.getElementById('usdt-trc').value);
            localStorage.setItem('walletUSDT_ERC20', document.getElementById('usdt-erc').value);
            localStorage.setItem('walletUSDC_TRC20', document.getElementById('usdc-trc').value);
            localStorage.setItem('walletUSDC_ERC20', document.getElementById('usdc-erc').value);
            localStorage.setItem('walletBTC', document.getElementById('btc-main').value);
            localStorage.setItem('walletETH', document.getElementById('eth-erc').value);
            alert("All Wallets saved successfully.");
        }
        function loadLoans() {
            const loans = JSON.parse(localStorage.getItem('loans')) || [];
            const container = document.getElementById('loans-list');
            container.innerHTML = loans.length ? loans.map(l => `
                <div class="bg-slate-800 p-6 rounded-3xl">
                    <div class="flex justify-between">
                        <div>
                            <div class="font-semibold">Loan Request</div>
                            <div class="text-sm text-slate-400">User: ${l.userId} • $${l.amount} • ${l.period} • ${l.time}</div>
                        </div>
                        <div>
                            <button onclick="approveLoan('${l.id}')" class="px-6 py-2 bg-emerald-600 rounded-xl">Approve</button>
                            <button onclick="rejectLoan('${l.id}')" class="ml-2 px-6 py-2 bg-red-600 rounded-xl">Reject</button>
                        </div>
                    </div>
                </div>
            `).join('') : '<p class="text-slate-400">No loan requests yet.</p>';
        }
        function approveLoan(id) {
            let loans = JSON.parse(localStorage.getItem('loans')) || [];
            const loan = loans.find(l => l.id == id);
            if (loan) loan.status = "Approved";
            localStorage.setItem('loans', JSON.stringify(loans));
            alert("Loan approved.");
            loadLoans();
        }
        function rejectLoan(id) {
            let loans = JSON.parse(localStorage.getItem('loans')) || [];
            const loan = loans.find(l => l.id == id);
            if (loan) loan.status = "Rejected";
            localStorage.setItem('loans', JSON.stringify(loans));
            alert("Loan rejected.");
            loadLoans();
        }
        function loadTickets() {
            const tickets = JSON.parse(localStorage.getItem('tickets')) || [];
            const container = document.getElementById('tickets-list');
            container.innerHTML = tickets.length ? tickets.map(t => `
                <div class="bg-slate-800 p-6 rounded-3xl">
                    <div class="flex justify-between">
                        <div>
                            <div class="font-semibold">${t.coin} Withdraw</div>
                            <div class="text-sm text-slate-400">User: ${t.userId} • ${t.amount} ${t.network} • ${t.time}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-mono text-xs">${t.address}</div>
                            <button onclick="approveTicket('${t.id}')" class="mt-4 px-6 py-2 bg-emerald-600 rounded-xl">Approve</button>
                        </div>
                    </div>
                </div>
            `).join('') : '<p class="text-slate-400">No tickets yet.</p>';
        }
        function approveTicket(id) {
            let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
            tickets = tickets.filter(t => t.id !== id);
            localStorage.setItem('tickets', JSON.stringify(tickets));
            alert("Approved withdraw request.");
            loadTickets();
        }
        window.onload = () => {
            const saved = localStorage.getItem('userBalance') || 0;
            document.getElementById('user-balance').value = saved;
            const force = localStorage.getItem('forceWin') === 'true';
            document.getElementById('force-win').checked = force;
            document.getElementById('force-win-label').textContent = force ? "ON" : "OFF";
            // Load multiple users
            let users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.length === 0) {
                users.push({id: 7842, email: "nyirimanajdamour@gmail.com", balance: 1000});
                localStorage.setItem('users', JSON.stringify(users));
            }
        };
    </script>
</body>
</html>
