<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 16px; padding: 24px; }
        .tab-active { background: #3b82f6; color: white; }
        input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px; border-radius: 8px; width: 100%; font-family: monospace; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-10 text-center">ADMIN DASHBOARD</h1>
        
        <!-- Tabs -->
        <div class="bg-[#1e2937] p-1 rounded-3xl flex mb-8 overflow-x-auto">
            <button onclick="switchTab(0)" class="tab tab-active flex-1 py-4 rounded-3xl text-lg font-medium">Dashboard</button>
            <button onclick="switchTab(1)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Users</button>
            <button onclick="switchTab(2)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Wallet</button>
            <button onclick="switchTab(3)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Loans</button>
            <button onclick="switchTab(4)" class="tab flex-1 py-4 rounded-3xl text-lg font-medium">Tickets</button>
        </div>

        <!-- Dashboard -->
        <div id="tab0" class="card">
            <h2 class="text-2xl font-semibold mb-6">Force Winning Mode</h2>
            <label class="flex items-center gap-4 text-lg">
                <input id="force-win" type="checkbox" onchange="toggleForceWin()">
                <span id="force-win-label">OFF</span>
            </label>
        </div>

        <!-- Users -->
        <div id="tab1" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Users</h2>
            <div id="users-list" class="space-y-4"></div>
        </div>

        <!-- Wallet -->
        <div id="tab2" class="card hidden">
            <h2 class="text-2xl font-semibold mb-8">Main Wallets (Deposit Addresses)</h2>
            <div class="space-y-8">
                <div>
                    <h3 class="font-semibold mb-4 text-emerald-400">USDT</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="block mb-2 text-sm">TRC20</label><input id="usdt-trc" type="text" value="TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR"></div>
                        <div><label class="block mb-2 text-sm">ERC20</label><input id="usdt-erc" type="text" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1"></div>
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold mb-4 text-emerald-400">USDC</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="block mb-2 text-sm">TRC20</label><input id="usdc-trc" type="text" value="TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR"></div>
                        <div><label class="block mb-2 text-sm">ERC20</label><input id="usdc-erc" type="text" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1"></div>
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold mb-4 text-emerald-400">BTC</h3>
                    <div><label class="block mb-2 text-sm">Mainnet</label><input id="btc-main" type="text" value="14CDc1TVGMsnAcXFCYXVSPjLNqe4vDMuBp"></div>
                </div>
                <div>
                    <h3 class="font-semibold mb-4 text-emerald-400">ETH</h3>
                    <div><label class="block mb-2 text-sm">ERC20</label><input id="eth-erc" type="text" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1"></div>
                </div>
            </div>
            <button onclick="saveWallets()" class="mt-10 w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-3xl text-lg font-semibold">Save All Wallets</button>
        </div>

        <!-- Loans & Tickets (unchanged) -->
        <div id="tab3" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Loan Requests</h2>
            <p class="text-slate-400">No loan requests yet.</p>
        </div>
        <div id="tab4" class="card hidden">
            <h2 class="text-2xl font-semibold mb-6">Withdraw Tickets</h2>
            <div id="tickets-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const apiBase = "https://tradexax-production.up.railway.app";

        function switchTab(n) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
            if (n === 1) loadUsers();
            if (n === 4) loadTickets();
        }

        async function toggleForceWin() {
            const isOn = document.getElementById('force-win').checked;
            try {
                await fetch(`${apiBase}/settings/forcewin`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ value: isOn })
                });
            } catch (e) {
                console.error("Failed to save force win");
            }
            document.getElementById('force-win-label').textContent = isOn ? "ON" : "OFF";
        }

        function saveWallets() {
            localStorage.setItem('walletUSDT_TRC20', document.getElementById('usdt-trc').value);
            localStorage.setItem('walletUSDT_ERC20', document.getElementById('usdt-erc').value);
            localStorage.setItem('walletUSDC_TRC20', document.getElementById('usdc-trc').value);
            localStorage.setItem('walletUSDC_ERC20', document.getElementById('usdc-erc').value);
            localStorage.setItem('walletBTC', document.getElementById('btc-main').value);
            localStorage.setItem('walletETH', document.getElementById('eth-erc').value);
            alert("✅ All Wallets saved successfully!");
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${apiBase}/users`);
                const users = await res.json();
                const container = document.getElementById('users-list');
                container.innerHTML = users.length ? users.map(u => `
                    <div class="bg-[#111827] p-6 rounded-3xl flex justify-between items-center">
                        <div>
                            <strong>User ID: ${u.id}</strong><br>
                            <span class="text-slate-400">${u.name || u.email}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-emerald-400">Balance: $${parseFloat(u.balance || 0).toLocaleString()}</div>
                            <button onclick="updateBalance(${u.id})" class="mt-3 px-6 py-2 bg-blue-600 rounded-xl text-sm">Edit Balance</button>
                        </div>
                    </div>
                `).join('') : '<p class="text-slate-400">No users yet.</p>';
            } catch (e) {
                document.getElementById('users-list').innerHTML = '<p class="text-red-400">Cannot connect to server.</p>';
            }
        }

        async function updateBalance(userId) {
            const balance = prompt("New balance for user " + userId + ":");
            if (balance === null) return;
            try {
                await fetch(`${apiBase}/update-balance`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ id: userId, balance: parseFloat(balance) })
                });
                alert("✅ Balance updated!");
                loadUsers();
            } catch (e) {
                alert("Failed to update balance");
            }
        }

        function loadTickets() {
            const tickets = JSON.parse(localStorage.getItem('tickets')) || [];
            const container = document.getElementById('tickets-list');
            container.innerHTML = tickets.length ? tickets.map(t => `
                <div class="bg-[#111827] p-6 rounded-3xl">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-semibold">${t.coin} ${t.network} Withdraw</div>
                            <div class="text-sm text-slate-400">User ID: ${t.userId} • Amount: $${t.amount}</div>
                            <div class="text-xs font-mono break-all mt-1">${t.address}</div>
                            <div class="text-xs text-slate-500 mt-1">${t.time}</div>
                        </div>
                        <button onclick="approveTicket('${t.id}')" class="px-6 py-2 bg-emerald-600 rounded-xl text-sm">Approve</button>
                    </div>
                </div>
            `).join('') : '<p class="text-slate-400">No withdraw requests yet.</p>';
        }

        function approveTicket(id) {
            let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
            tickets = tickets.filter(t => t.id !== id);
            localStorage.setItem('tickets', JSON.stringify(tickets));
            alert("✅ Withdraw request approved!");
            loadTickets();
        }

        window.onload = () => {
            document.getElementById('usdt-trc').value = "TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR";
            document.getElementById('usdt-erc').value = "0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1";
            document.getElementById('usdc-trc').value = "TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR";
            document.getElementById('usdc-erc').value = "0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1";
            document.getElementById('btc-main').value = "14CDc1TVGMsnAcXFCYXVSPjLNqe4vDMuBp";
            document.getElementById('eth-erc').value = "0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1";
            switchTab(2);
        };
    </script>
</body>
</html>
