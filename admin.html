<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 16px; padding: 24px; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-10 text-center">ADMIN DASHBOARD</h1>
        
        <div class="bg-[#1e2937] p-1 rounded-3xl flex mb-8">
            <button onclick="switchTab(2)" class="tab tab-active flex-1 py-4">Wallet</button>
        </div>

        <div class="card">
            <h2 class="text-2xl font-semibold mb-6">Main Wallets (Deposit Addresses)</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-emerald-400">USDT - TRC20</label>
                    <input id="usdt-trc" class="w-full p-3 bg-slate-800 rounded-xl" value="TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR">
                </div>
                <div>
                    <label class="block text-emerald-400">USDT - ERC20</label>
                    <input id="usdt-erc" class="w-full p-3 bg-slate-800 rounded-xl" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1">
                </div>
                <div>
                    <label class="block text-emerald-400">USDC - TRC20</label>
                    <input id="usdc-trc" class="w-full p-3 bg-slate-800 rounded-xl" value="TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR">
                </div>
                <div>
                    <label class="block text-emerald-400">USDC - ERC20</label>
                    <input id="usdc-erc" class="w-full p-3 bg-slate-800 rounded-xl" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1">
                </div>
                <div>
                    <label class="block text-emerald-400">BTC - Mainnet</label>
                    <input id="btc-main" class="w-full p-3 bg-slate-800 rounded-xl" value="14CDc1TVGMsnAcXFCYXVSPjLNqe4vDMuBp">
                </div>
                <div>
                    <label class="block text-emerald-400">ETH - ERC20</label>
                    <input id="eth-erc" class="w-full p-3 bg-slate-800 rounded-xl" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1">
                </div>
            </div>
            <button onclick="saveWallets()" class="mt-8 w-full py-4 bg-blue-600 rounded-3xl text-lg">Save All Wallets</button>
        </div>
    </div>

    <script>
        function saveWallets() {
            localStorage.setItem('walletUSDT_TRC20', document.getElementById('usdt-trc').value.trim());
            localStorage.setItem('walletUSDT_ERC20', document.getElementById('usdt-erc').value.trim());
            localStorage.setItem('walletUSDC_TRC20', document.getElementById('usdc-trc').value.trim());
            localStorage.setItem('walletUSDC_ERC20', document.getElementById('usdc-erc').value.trim());
            localStorage.setItem('walletBTC', document.getElementById('btc-main').value.trim());
            localStorage.setItem('walletETH', document.getElementById('eth-erc').value.trim());
            alert("✅ All Wallets Saved Successfully!");
        }
    </script>
</body>
</html>
