<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; font-family: system-ui, sans-serif; }
        .card { background: #1e2937; border-radius: 12px; padding: 20px; }
        .price-up { color: #22c55e; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#111827] border-b border-slate-700 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="text-3xl font-bold text-blue-400">TradexaX</div>
            <nav class="flex gap-8 text-sm font-medium">
                <a href="index.html">Dashboard</a>
                <a href="trade.html" class="text-blue-400">Trade</a>
                <a href="deposit.html">Deposit</a>
                <a href="withdraw.html">Withdraw</a>
                <a href="auth.html">Account</a>
            </nav>
            <div class="text-sm">Balance: <span class="text-emerald-400 font-bold">$12,450 USDT</span></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <h1 class="text-3xl font-bold">BTC/USDT</h1>
                <span id="live-price" class="text-4xl font-bold price-up">67,845.20</span>
            </div>
            <div class="text-right text-sm">
                <div>24h: <span class="text-emerald-400">+2.41%</span></div>
                <div>High: 68,920 | Low: 65,780</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Chart (Real Binance-like) -->
            <div class="lg:col-span-8 card">
                <div id="chart" class="h-[520px]"></div>
            </div>

            <!-- Order Panel -->
            <div class="lg:col-span-4 space-y-6">
                <div class="card">
                    <div class="flex gap-2 mb-6">
                        <button onclick="setSide('buy')" class="flex-1 py-4 font-bold rounded-xl bg-emerald-600 hover:bg-emerald-500">BUY / LONG</button>
                        <button onclick="setSide('sell')" class="flex-1 py-4 font-bold rounded-xl bg-red-600 hover:bg-red-500">SELL / SHORT</button>
                    </div>

                    <div class="space-y-5">
                        <div>
                            <label class="text-xs text-slate-400">Amount (USDT)</label>
                            <input id="amount" type="number" value="500" class="w-full bg-gray-800 p-4 rounded-xl mt-1 text-lg">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400">Leverage</label>
                            <input type="number" value="20" class="w-full bg-gray-800 p-4 rounded-xl mt-1 text-lg">
                        </div>
                    </div>

                    <button onclick="placeOrder()" class="mt-8 w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl text-xl font-bold transition">
                        PLACE ORDER
                    </button>
                </div>

                <div class="card">
                    <h3 class="mb-3">Open Positions</h3>
                    <p class="text-slate-400 text-sm">No open positions.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let chart;
        function initChart() {
            const container = document.getElementById('chart');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 520,
                layout: { backgroundColor: '#1e2937', textColor: '#e2e8f0' },
                grid: { vertLines: { color: '#334155' }, horzLines: { color: '#334155' } },
            });
            const candleSeries = chart.addCandlestickSeries();
            candleSeries.setData([
                { time: '2025-06-20', open: 66500, high: 67800, low: 66200, close: 67845 },
                { time: '2025-06-21', open: 67845, high: 68500, low: 67000, close: 67200 },
                { time: '2025-06-22', open: 67200, high: 68000, low: 66800, close: 67900 },
            ]);
            chart.timeScale().fitContent();
        }

        function setSide(side) {
            alert(side.toUpperCase() + " selected");
        }

        function placeOrder() {
            const amount = document.getElementById('amount').value;
            alert(`✅ Order placed successfully!\nAmount: $${amount} USDT`);
        }

        window.onload = initChart;
    </script>
</body>
</html>
