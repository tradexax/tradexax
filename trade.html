<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 20px; padding: 24px; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#111827] py-5 px-6 flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <span onclick="window.location.href='index.html'" class="cursor-pointer text-3xl">←</span>
            <h1 class="text-2xl font-bold">TradexaX</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="mb-6">
            <select id="pair" onchange="changePair()" class="w-full bg-slate-800 p-5 rounded-2xl text-lg">
                <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                <option value="BINANCE:ETHUSDT">ETH/USDT</option>
                <option value="BINANCE:SOLUSDT">SOL/USDT</option>
                <option value="BINANCE:XRPUSDT">XRP/USDT</option>
                <option value="BINANCE:ADAUSDT">ADA/USDT</option>
                <option value="BINANCE:BNBUSDT">BNB/USDT</option>
                <option value="BINANCE:AVAXUSDT">AVAX/USDT</option>
                <option value="BINANCE:DOGEUSDT">DOGE/USDT</option>
                <option value="BINANCE:LINKUSDT">LINK/USDT</option>
                <option value="BINANCE:TRXUSDT">TRX/USDT</option>
                <option value="FX_IDC:XAUUSD">GOLD/USD</option>
            </select>
        </div>

        <div>
            <div class="text-5xl font-bold mb-1" id="price-display">$64,007.59</div>
            <div class="text-emerald-400" id="change">+0.45% Today</div>
        </div>

        <!-- Real Chart -->
        <div class="card mb-8">
            <div class="h-96">
                <iframe id="chart-frame" width="100%" height="100%" src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Binary Options -->
        <div class="card">
            <h3 class="font-semibold mb-6">Binary Options Trade</h3>

            <div class="mb-8">
                <p class="text-sm text-slate-400 mb-3">Expiry Time</p>
                <div id="expiry-buttons" class="grid grid-cols-4 gap-3">
                    <button onclick="selectExpiry(1, this)" class="py-6 bg-slate-700 hover:bg-slate-600 rounded-3xl text-sm flex flex-col items-center">
                        <span>1 Min</span>
                        <span class="text-xs text-emerald-400">10% • Max $10K</span>
                    </button>
                    <button onclick="selectExpiry(2, this)" class="py-6 bg-slate-700 hover:bg-slate-600 rounded-3xl text-sm flex flex-col items-center">
                        <span>2 Min</span>
                        <span class="text-xs text-emerald-400">15% • Max $20K</span>
                    </button>
                    <button onclick="selectExpiry(3, this)" class="py-6 bg-slate-700 hover:bg-slate-600 rounded-3xl text-sm flex flex-col items-center">
                        <span>3 Min</span>
                        <span class="text-xs text-emerald-400">20% • Max $30K</span>
                    </button>
                    <button onclick="selectExpiry(5, this)" class="py-6 bg-slate-700 hover:bg-slate-600 rounded-3xl text-sm flex flex-col items-center">
                        <span>5 Min</span>
                        <span class="text-xs text-emerald-400">25% • No Limit</span>
                    </button>
                </div>
                <div id="countdown" class="text-center text-4xl font-bold mt-8 text-emerald-400 hidden">00:59</div>
            </div>

            <div>
                <p class="text-sm text-slate-400 mb-3">Investment Amount (USDT)</p>
                <input id="investment" type="number" value="500" class="w-full bg-slate-800 p-6 rounded-2xl text-2xl">
                <p id="limit-info" class="text-xs text-slate-400 mt-2"></p>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="placeTrade('UP')" class="flex-1 py-8 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-2xl font-bold">UP ↑</button>
                <button onclick="placeTrade('DOWN')" class="flex-1 py-8 bg-red-600 hover:bg-red-500 rounded-3xl text-2xl font-bold">DOWN ↓</button>
            </div>
        </div>

        <!-- Trade History -->
        <div class="card mt-8">
            <h3 class="font-semibold mb-6">Trade History</h3>
            <div id="history" class="space-y-3"></div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="card w-full max-w-md mx-4">
            <h3 class="font-bold text-2xl mb-6">Trade Detail</h3>
            <div id="detail-content" class="space-y-4"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-6 bg-slate-700 rounded-3xl">Close</button>
        </div>
    </div>

    <script>
        let timer;
        const payout = {1: 0.10, 2: 0.15, 3: 0.20, 5: 0.25};
        const limits = {1: 10000, 2: 20000, 3: 30000, 5: 999999};
        let history = [];
        let selectedMinutes = 1;

        function isForceWin() {
            return localStorage.getItem('forceWin') === 'true';
        }

        function changePair() {
            const symbol = document.getElementById('pair').value;
            document.getElementById('chart-frame').src = `https://www.tradingview.com/widgetembed/?symbol=${symbol}&interval=1&theme=dark`;

            // Simulate price update
            const prices = {
                'BINANCE:BTCUSDT': '$64,007.59',
                'BINANCE:ETHUSDT': '$3,456.78',
                'BINANCE:SOLUSDT': '$142.35',
                'BINANCE:XRPUSDT': '$0.52',
                'BINANCE:ADAUSDT': '$0.45',
                'BINANCE:BNBUSDT': '$585.23',
                'BINANCE:AVAXUSDT': '$28.45',
                'BINANCE:DOGEUSDT': '$0.12',
                'BINANCE:LINKUSDT': '$13.67',
                'BINANCE:TRXUSDT': '$0.16',
                'FX_IDC:XAUUSD': '$2,650.45'
            };
            document.getElementById('price-display').textContent = prices[symbol] || '$64,007.59';
        }

        function selectExpiry(minutes, btn) {
            selectedMinutes = minutes;
            document.querySelectorAll('#expiry-buttons button').forEach(b => b.classList.remove('bg-emerald-600'));
            btn.classList.add('bg-emerald-600');

            const max = limits[minutes];
            document.getElementById('limit-info').textContent = `Max: $${max.toLocaleString()}`;
            document.getElementById('investment').max = max;
            if (parseFloat(document.getElementById('investment').value) > max) document.getElementById('investment').value = max;
        }

        function placeTrade(direction) {
            const amount = parseFloat(document.getElementById('investment').value);
            if (!amount) return alert("Enter amount");

            const max = limits[selectedMinutes];
            if (amount > max) return alert(`Insufficient balance for this expiry. Max $${max}`);

            document.getElementById('countdown').classList.remove('hidden');
            let seconds = selectedMinutes * 60;

            clearInterval(timer);
            timer = setInterval(() => {
                seconds--;
                const min = Math.floor(seconds / 60);
                const sec = seconds % 60;
                document.getElementById('countdown').textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (seconds <= 0) {
                    clearInterval(timer);
                    endTrade(direction);
                }
            }, 1000);
        }

        function endTrade(direction) {
            const amount = parseFloat(document.getElementById('investment').value);
            const isWin = isForceWin() ? true : Math.random() > 0.5;
            const profitRate = payout[selectedMinutes];
            const profit = isWin ? amount * profitRate : -amount;

            history.unshift({
                direction: direction,
                amount: amount,
                profit: profit,
                time: new Date().toLocaleTimeString(),
                status: isWin ? "WIN" : "LOSS",
                rate: profitRate
            });

            alert(isWin ? `✅ WIN! +$${profit.toFixed(2)} (${profitRate*100}%)` : `❌ LOSS -$${amount}`);

            updateHistory();
        }

        function updateHistory() {
            const container = document.getElementById('history');
            container.innerHTML = history.map((h, index) => `
                <div onclick="showDetail(${index})" class="flex justify-between p-4 bg-[#111827] rounded-2xl cursor-pointer hover:bg-slate-700">
                    <div>${h.direction} • ${h.time}</div>
                    <div class="${h.profit > 0 ? 'text-emerald-400' : 'text-red-400'}">${h.status} $${h.profit.toFixed(2)}</div>
                </div>
            `).join('');
        }

        function showDetail(index) {
            const h = history[index];
            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between"><span>Direction</span><strong>${h.direction}</strong></div>
                    <div class="flex justify-between"><span>Time</span><strong>${h.time}</strong></div>
                    <div class="flex justify-between"><span>Investment</span><strong>$${h.amount}</strong></div>
                    <div class="flex justify-between"><span>Result</span><strong class="${h.profit > 0 ? 'text-emerald-400' : 'text-red-400'}">${h.status}</strong></div>
                    <div class="flex justify-between"><span>Profit</span><strong class="${h.profit > 0 ? 'text-emerald-400' : 'text-red-400'}">$${h.profit.toFixed(2)} (${h.rate*100}%)</strong></div>
                </div>
            `;
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
        }
    </script>
</body>
</html>
