        .countdown { font-size: 3rem; font-weight: bold; color: #fbbf24; }

<body class="min-h-screen">
    <!-- Header and UI same as before (shortened for space) -->
    <header class="bg-[#111827] py-5 px-6 flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <span onclick="window.location.href='index.html'" class="cursor-pointer text-3xl">←</span>
            <h1 class="text-2xl font-bold">TradexaX</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <!-- ... (pair select, chart, time buttons, amount, UP/DOWN buttons, countdown, history - same as previous) ... -->
        <!-- For brevity, assume you keep the UI part from last version. The important part is the script below. -->
    </main>

    <script>
        const apiBase = "https://tradexax-production.up.railway.app";
        let selectedMinutes = 1;
        let timer = null;

        async function isForceWinActive() {
            try {
                const res = await fetch(`${apiBase}/force-win-status`);
                const data = await res.json();
                return data.forceWin === true;
            } catch (e) {
                return localStorage.getItem('forceWin') === 'true';
            }
        }

        async function endTrade(direction, amount) {
            const forceWin = await isForceWinActive();
            const isWin = forceWin ? true : Math.random() > 0.6;

            let rate = 0.10;
            if (selectedMinutes === 2) rate = 0.15;
            else if (selectedMinutes === 3) rate = 0.20;
            else if (selectedMinutes >= 5) rate = 0.25;

            const profit = isWin ? Math.round(amount * rate) : -amount;
            let current = await loadBalance();
            const newBalance = Math.max(0, current + profit);

            await updateBalance(newBalance);

            // ... history code same as before ...
            alert(isWin ? `🎉 WIN +$${profit}` : `💥 LOSS -$${amount}`);
        }

        // Keep other functions (loadBalance, updateBalance, placeTrade, etc.) from previous version
        // ... (paste the rest of the script from previous version here) ...
    </script>
</body>
