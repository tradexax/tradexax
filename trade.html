<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 20px; padding: 24px; }
        .countdown { font-size: 3rem; font-weight: bold; color: #fbbf24; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#111827] py-5 px-6 flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <span onclick="window.location.href='index.html'" class="cursor-pointer text-3xl">←</span>
            <h1 class="text-2xl font-bold">TradexaX</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <!-- Pair and Chart -->
        <div class="mb-6">
            <select id="pair" onchange="changePair()" class="w-full bg-slate-800 p-5 rounded-2xl text-lg">
                <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                <option value="BINANCE:ETHUSDT">ETH/USDT</option>
                <option value="BINANCE:SOLUSDT">SOL/USDT</option>
                <option value="FX:XAUUSD">GOLD (XAU/USD)</option>
            </select>
        </div>
        <div class="card mb-8" style="height: 420px;">
            <iframe id="trading-chart" width="100%" height="400" frameborder="0" allowfullscreen></iframe>
        </div>

        <!-- Time Options -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="selectTime(1)" id="time1" class="time-btn card text-center py-4">1 Min (Max 10K, +10%)</button>
            <button onclick="selectTime(2)" id="time2" class="time-btn card text-center py-4">2 Min (Max 20K, +15%)</button>
            <button onclick="selectTime(3)" id="time3" class="time-btn card text-center py-4">3 Min (Max 30K, +20%)</button>
            <button onclick="selectTime(5)" id="time5" class="time-btn card text-center py-4">5 Min (No Limit, +25%)</button>
        </div>

        <!-- Amount -->
        <div class="card mb-8">
            <div class="flex justify-between mb-6">
                <div>
                    <div class="text-sm text-slate-400">Amount (USDT)</div>
                    <input id="trade-amount" type="number" class="w-full bg-slate-900 text-4xl font-bold p-4 rounded-2xl" placeholder="100">
                </div>
                <div class="text-right">
                    <div class="text-sm text-slate-400">Balance</div>
                    <div id="current-balance" class="text-2xl font-bold text-emerald-400">$0</div>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="placeTrade('UP')" class="flex-1 py-8 bg-emerald-600 rounded-3xl text-2xl font-bold">UP ↑</button>
                <button onclick="placeTrade('DOWN')" class="flex-1 py-8 bg-red-600 rounded-3xl text-2xl font-bold">DOWN ↓</button>
            </div>
        </div>

        <!-- Countdown -->
        <div id="countdown-container" class="card hidden mb-8 text-center">
            <div class="text-slate-400">Time Remaining</div>
            <div id="countdown" class="countdown">00:00</div>
        </div>

        <!-- History -->
        <div class="card">
            <h3 class="text-xl font-semibold mb-4">Trade History</h3>
            <div id="history" class="space-y-3"></div>
        </div>
    </main>

    <script>
        const apiBase = "https://tradexax-production.up.railway.app";
        let selectedMinutes = 1;
        let timer = null;

        function changePair() {
            const symbol = document.getElementById('pair').value;
            document.getElementById('trading-chart').src = `https://www.tradingview.com/widgetembed/?symbol=${symbol}&interval=1&theme=dark`;
        }

        function selectTime(min) {
            selectedMinutes = min;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('ring-2', 'ring-blue-500'));
            document.getElementById('time' + min).classList.add('ring-2', 'ring-blue-500');
        }

        async function loadBalance() {
            const userId = localStorage.getItem('userId');
            if (!userId) return 0;
            try {
                const res = await fetch(`${apiBase}/users`);
                const users = await res.json();
                const user = users.find(u => u.id == userId);
                const balance = user ? parseFloat(user.balance || 0) : 0;
                document.getElementById('current-balance').textContent = '$' + balance.toLocaleString();
                return balance;
            } catch (e) { return 0; }
        }

        async function updateBalance(newBalance) {
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            try {
                await fetch(`${apiBase}/update-balance`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({id: userId, balance: newBalance})
                });
            } catch (e) {}
        }

        function startCountdown(seconds) {
            clearInterval(timer);
            document.getElementById('countdown-container').classList.remove('hidden');
            let timeLeft = seconds;
            timer = setInterval(() => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById('countdown').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timer);
                    document.getElementById('countdown-container').classList.add('hidden');
                }
            }, 1000);
        }

        async function placeTrade(direction) {
            const amount = parseFloat(document.getElementById('trade-amount').value);
            if (!amount || amount <= 0) return alert("Enter valid amount");

            const balance = await loadBalance();
            if (amount > balance) return alert("Insufficient balance");

            alert(`Trade started: ${direction} $${amount} for ${selectedMinutes} minutes...`);
            startCountdown(selectedMinutes * 60);

            setTimeout(() => endTrade(direction, amount), selectedMinutes * 60 * 1000);
        }

        async function endTrade(direction, amount) {
            const isForceWin = localStorage.getItem('forceWin') === 'true';
            const isWin = isForceWin ? true : Math.random() > 0.5;   // 100% win when ON

            let rate = 0.10;
            if (selectedMinutes === 2) rate = 0.15;
            else if (selectedMinutes === 3) rate = 0.20;
            else if (selectedMinutes >= 5) rate = 0.25;

            const profit = isWin ? Math.round(amount * rate) : -amount;
            let current = await loadBalance();
            const newBalance = current + profit;

            await updateBalance(newBalance);

            let history = JSON.parse(localStorage.getItem('tradeHistory') || '[]');
            history.unshift({
                time: new Date().toLocaleString(),
                direction,
                amount,
                result: isWin ? 'WIN' : 'LOSS',
                profit
            });
            localStorage.setItem('tradeHistory', JSON.stringify(history.slice(0, 20)));

            renderHistory();
            await loadBalance();

            alert(isWin ? `🎉 WIN +$${profit}` : `💥 LOSS -$${amount}`);
        }

        function renderHistory() {
            const container = document.getElementById('history');
            const history = JSON.parse(localStorage.getItem('tradeHistory') || '[]');
            container.innerHTML = history.map(h => `
                <div class="flex justify-between bg-[#111827] p-4 rounded-2xl">
                    <div>${h.direction} • ${h.time}</div>
                    <div class="${h.profit > 0 ? 'text-emerald-400' : 'text-red-400'} font-semibold">${h.result} $${h.profit}</div>
                </div>
            `).join('');
        }

        window.onload = () => {
            changePair();
            renderHistory();
            selectTime(1);
            loadBalance();
        };
    </script>
</body>
</html>
