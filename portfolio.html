<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 20px; padding: 24px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#111827] py-5 px-6 flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <span onclick="window.location.href='index.html'" class="cursor-pointer text-3xl">←</span>
            <h1 class="text-2xl font-bold">TradexaX</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-8">Portfolio</h1>
        <div class="card mb-8">
            <p class="text-slate-400 mb-2">Total Assets</p>
            <div id="total-assets" class="text-6xl font-bold">$0</div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="showDeposit()" class="card flex flex-col items-center py-12 hover:bg-slate-700">
                <div class="text-4xl mb-4">↓</div>
                <div class="text-xl font-semibold">Deposit</div>
            </button>
            <button onclick="showWithdraw()" class="card flex flex-col items-center py-12 hover:bg-slate-700">
                <div class="text-4xl mb-4">↑</div>
                <div class="text-xl font-semibold">Withdraw</div>
            </button>
        </div>
    </main>

    <!-- Deposit Modal -->
    <div id="deposit-modal" class="modal">
        <div class="card w-full max-w-md mx-4">
            <h2 class="text-2xl font-bold mb-6">Deposit</h2>
            <select id="deposit-coin" onchange="updateDepositAddress()" class="w-full bg-slate-800 p-4 rounded-2xl mb-4">
                <option value="USDT">USDT</option>
                <option value="USDC">USDC</option>
                <option value="BTC">BTC</option>
                <option value="ETH">ETH</option>
            </select>
            <select id="deposit-network" onchange="updateDepositAddress()" class="w-full bg-slate-800 p-4 rounded-2xl mb-6"></select>
            <div class="mb-6">
                <p class="text-slate-400 mb-2">Send to this address:</p>
                <div id="deposit-address" class="bg-slate-900 p-4 rounded-2xl font-mono text-sm break-all"></div>
            </div>
            <button onclick="confirmDeposit()" class="w-full py-4 bg-emerald-600 rounded-3xl mb-3">Confirm Deposit</button>
            <button onclick="closeDepositModal()" class="w-full py-4 bg-slate-700 rounded-3xl">Cancel</button>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdraw-modal" class="modal">
        <div class="card w-full max-w-md mx-4">
            <h2 class="text-2xl font-bold mb-6">Withdraw</h2>
            <select id="withdraw-coin" onchange="updateWithdrawNetwork()" class="w-full bg-slate-800 p-4 rounded-2xl mb-4">
                <option value="USDT">USDT</option>
                <option value="USDC">USDC</option>
                <option value="BTC">BTC</option>
                <option value="ETH">ETH</option>
            </select>
            <select id="withdraw-network" class="w-full bg-slate-800 p-4 rounded-2xl mb-6"></select>
            <input id="withdraw-address" type="text" placeholder="Your Destination Wallet Address" class="w-full bg-slate-800 p-4 rounded-2xl mb-6">
            <input id="withdraw-amount" type="number" placeholder="Amount (USDT)" class="w-full bg-slate-800 p-4 rounded-2xl mb-6">
            <button onclick="processWithdraw()" class="w-full py-4 bg-red-600 rounded-3xl mb-3">Confirm Withdraw</button>
            <button onclick="closeWithdrawModal()" class="w-full py-4 bg-slate-700 rounded-3xl">Cancel</button>
        </div>
    </div>

    <script>
        const apiBase = "https://tradexax-production.up.railway.app";

        async function loadBalance() {
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            try {
                const res = await fetch(`${apiBase}/users`);
                const users = await res.json();
                const user = users.find(u => u.id == userId);
                const balance = user ? user.balance : 0;
                document.getElementById('total-assets').textContent = '$' + parseFloat(balance).toLocaleString();
            } catch (e) {}
        }
        setInterval(loadBalance, 3000);
        window.onload = loadBalance;

        // Deposit Functions
        function showDeposit() {
            document.getElementById('deposit-modal').style.display = 'flex';
            updateDepositAddress();
        }
        function closeDepositModal() {
            document.getElementById('deposit-modal').style.display = 'none';
        }
        function updateDepositAddress() {
            const coin = document.getElementById('deposit-coin').value;
            const networkSelect = document.getElementById('deposit-network');
            networkSelect.innerHTML = '';
            if (coin === 'USDT' || coin === 'USDC') {
                networkSelect.innerHTML = `<option value="TRC20">TRC20</option><option value="ERC20">ERC20</option>`;
            } else if (coin === 'ETH') {
                networkSelect.innerHTML = `<option value="ERC20">ERC20</option>`;
            } else if (coin === 'BTC') {
                networkSelect.innerHTML = `<option value="Mainnet">Mainnet</option>`;
            }
            const network = networkSelect.value || (coin === 'USDT' || coin === 'USDC' ? 'TRC20' : coin === 'ETH' ? 'ERC20' : 'Mainnet');
            let key = `wallet${coin}_${network}`;
            if (coin === 'BTC') key = 'walletBTC';
            if (coin === 'ETH') key = 'walletETH';
            const addr = localStorage.getItem(key) || 'No address saved in Admin';
            document.getElementById('deposit-address').textContent = addr;
        }
        function confirmDeposit() {
            alert("✅ Deposit request sent to Admin.");
            closeDepositModal();
        }

        // Withdraw Functions
        function showWithdraw() {
            document.getElementById('withdraw-modal').style.display = 'flex';
            updateWithdrawNetwork();
        }
        function closeWithdrawModal() {
            document.getElementById('withdraw-modal').style.display = 'none';
        }
        function updateWithdrawNetwork() {
            const coin = document.getElementById('withdraw-coin').value;
            const networkSelect = document.getElementById('withdraw-network');
            networkSelect.innerHTML = '';
            if (coin === 'USDT' || coin === 'USDC') {
                networkSelect.innerHTML = `<option value="TRC20">TRC20</option><option value="ERC20">ERC20</option>`;
            } else if (coin === 'ETH') {
                networkSelect.innerHTML = `<option value="ERC20">ERC20</option>`;
            } else if (coin === 'BTC') {
                networkSelect.innerHTML = `<option value="Mainnet">Mainnet</option>`;
            }
        }
        function processWithdraw() {
            const coin = document.getElementById('withdraw-coin').value;
            const network = document.getElementById('withdraw-network').value;
            const address = document.getElementById('withdraw-address').value.trim();
            const amount = document.getElementById('withdraw-amount').value;
            if (!address || !amount) return alert("Please fill all fields");

            let tickets = JSON.parse(localStorage.getItem('tickets') || '[]');
            tickets.push({
                id: Date.now(),
                userId: localStorage.getItem('userId') || 'Unknown',
                coin: coin,
                network: network,
                amount: amount,
                address: address,
                time: new Date().toLocaleString(),
                status: "Pending"
            });
            localStorage.setItem('tickets', JSON.stringify(tickets));

            alert("✅ Withdraw request sent to Admin Ticket!");
            closeWithdrawModal();
        }
    </script>
</body>
</html>
