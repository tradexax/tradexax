<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 20px; padding: 24px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#111827] py-5 px-6 flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <span onclick="window.location.href='index.html'" class="cursor-pointer text-3xl">←</span>
            <h1 class="text-2xl font-bold">TradexaX</h1>
        </div>
    </header>
    <main class="max-w-7xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-8">Portfolio</h1>
        <div class="card mb-8">
            <p class="text-slate-400 mb-2">Total Assets</p>
            <div id="total-assets" class="text-6xl font-bold">$0.00</div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="showDeposit()" class="card flex flex-col items-center py-12 hover:bg-slate-700">
                <div class="text-4xl mb-4">↓</div>
                <div class="text-xl font-semibold">Deposit</div>
            </button>
            <button onclick="showWithdraw()" class="card flex flex-col items-center py-12 hover:bg-slate-700">
                <div class="text-4xl mb-4">↑</div>
                <div class="text-xl font-semibold">Withdraw</div>
            </button>
        </div>
    </main>

    <!-- Deposit Modal -->
    <div id="deposit-modal" class="modal">
        <div class="card w-full max-w-md mx-4">
            <h3 class="font-bold text-2xl mb-6">Deposit</h3>
            <select id="deposit-coin" class="w-full bg-slate-800 p-4 rounded-2xl mb-4" onchange="updateNetworkOptions()">
                <option value="USDT">USDT</option>
                <option value="USDC">USDC</option>
                <option value="ETH">ETH</option>
                <option value="BTC">BTC</option>
            </select>
            <select id="deposit-network" class="w-full bg-slate-800 p-4 rounded-2xl mb-6"></select>
            <input type="number" placeholder="Amount" class="w-full bg-slate-800 p-6 rounded-2xl text-2xl mb-6">
            <button onclick="processDeposit()" class="w-full py-6 bg-emerald-600 rounded-3xl">Confirm Deposit</button>
            <button onclick="closeDepositModal()" class="w-full mt-4 py-6 bg-slate-700 rounded-3xl">Cancel</button>
        </div>
    </div>

    <!-- Deposit Success -->
    <div id="deposit-success" class="modal">
        <div class="card w-full max-w-md mx-4">
            <h3 class="font-bold text-2xl mb-6">Deposit Address</h3>
            <div class="bg-slate-800 p-4 rounded-2xl text-sm font-mono break-all mb-6" id="wallet-address">No wallet saved yet</div>
            <button onclick="closeSuccessModal()" class="w-full py-6 bg-emerald-600 rounded-3xl">Done</button>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdraw-modal" class="modal">
        <div class="card w-full max-w-md mx-4">
            <h3 class="font-bold text-2xl mb-6">Withdraw</h3>
            <select id="withdraw-coin" class="w-full bg-slate-800 p-4 rounded-2xl mb-4" onchange="updateWithdrawNetworkOptions()">
                <option value="USDT">USDT</option>
                <option value="USDC">USDC</option>
                <option value="ETH">ETH</option>
                <option value="BTC">BTC</option>
            </select>
            <select id="withdraw-network" class="w-full bg-slate-800 p-4 rounded-2xl mb-6"></select>
            <input id="withdraw-address" type="text" placeholder="Your Wallet Address" class="w-full bg-slate-800 p-6 rounded-2xl mb-6">
            <input id="withdraw-amount" type="number" placeholder="Amount" class="w-full bg-slate-800 p-6 rounded-2xl text-2xl mb-6">
            <button onclick="processWithdraw()" class="w-full py-6 bg-red-600 rounded-3xl">Confirm Withdraw</button>
            <button onclick="closeWithdrawModal()" class="w-full mt-4 py-6 bg-slate-700 rounded-3xl">Cancel</button>
        </div>
    </div>

    <script>
        const apiBase = "https://tradexax-production.up.railway.app";

        async function loadBalance() {
            const userId = localStorage.getItem('userId');
            if (!userId) return document.getElementById('total-assets').textContent = '$0.00';
            try {
                const res = await fetch(`${apiBase}/users`);
                const users = await res.json();
                const user = users.find(u => u.id == userId);
                document.getElementById('total-assets').textContent = '$' + parseFloat(user ? user.balance : 0).toLocaleString();
            } catch(e) {}
        }
        setInterval(loadBalance, 3000);
        window.onload = loadBalance;

        // ==================== DEPOSIT ====================
        function showDeposit() {
            if (localStorage.getItem('loggedIn') !== 'true') return alert("Please login first");
            document.getElementById('deposit-modal').style.display = 'flex';
            updateNetworkOptions();
        }
        function closeDepositModal() { document.getElementById('deposit-modal').style.display = 'none'; }

        function updateNetworkOptions() {
            const coin = document.getElementById('deposit-coin').value;
            const ns = document.getElementById('deposit-network');
            ns.innerHTML = '';
            if (coin === 'USDT' || coin === 'USDC') {
                ns.innerHTML = `<option value="TRC20">TRC20</option><option value="ERC20">ERC20</option>`;
            } else if (coin === 'ETH') {
                ns.innerHTML = `<option value="ERC20">ERC20</option>`;
            } else if (coin === 'BTC') {
                ns.innerHTML = `<option value="Mainnet">Mainnet</option>`;
            }
        }

        function processDeposit() {
            const coin = document.getElementById('deposit-coin').value;
            const network = document.getElementById('deposit-network').value;
            let key = `wallet${coin}`;
            if (coin === 'USDT' || coin === 'USDC') key += `_${network}`;

            let wallet = localStorage.getItem(key);

            // Fallback to your saved addresses
            if (!wallet) {
                if (coin === 'USDT' && network === 'TRC20') wallet = "TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR";
                else if (coin === 'USDT' && network === 'ERC20') wallet = "0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1";
                else if (coin === 'USDC' && network === 'TRC20') wallet = "TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR";
                else if (coin === 'USDC' && network === 'ERC20') wallet = "0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1";
                else if (coin === 'BTC') wallet = "14CDc1TVGMsnAcXFCYXVSPjLNqe4vDMuBp";
                else if (coin === 'ETH') wallet = "0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1";
            }

            closeDepositModal();
            document.getElementById('deposit-success').style.display = 'flex';
            document.getElementById('wallet-address').textContent = wallet;
        }

        function closeSuccessModal() {
            document.getElementById('deposit-success').style.display = 'none';
        }

        // ==================== WITHDRAW ====================
        function showWithdraw() {
            if (localStorage.getItem('loggedIn') !== 'true') return alert("Please login first");
            document.getElementById('withdraw-modal').style.display = 'flex';
            updateWithdrawNetworkOptions();
        }
        function closeWithdrawModal() { document.getElementById('withdraw-modal').style.display = 'none'; }

        function updateWithdrawNetworkOptions() {
            const coin = document.getElementById('withdraw-coin').value;
            const ns = document.getElementById('withdraw-network');
            ns.innerHTML = '';
            if (coin === 'USDT' || coin === 'USDC') {
                ns.innerHTML = `<option value="TRC20">TRC20</option><option value="ERC20">ERC20</option>`;
            } else if (coin === 'ETH') {
                ns.innerHTML = `<option value="ERC20">ERC20</option>`;
            } else if (coin === 'BTC') {
                ns.innerHTML = `<option value="Mainnet">Mainnet</option>`;
            }
        }

        function processWithdraw() {
            const coin = document.getElementById('withdraw-coin').value;
            const network = document.getElementById('withdraw-network').value;
            const address = document.getElementById('withdraw-address').value;
            const amount = document.getElementById('withdraw-amount').value;

            if (!address || !amount) return alert("Please fill all fields");

            let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
            tickets.push({
                id: Date.now(),
                userId: localStorage.getItem('userId') || 'Unknown',
                coin: coin,
                network: network,
                amount: amount,
                address: address,
                time: new Date().toLocaleString(),
                status: "Pending"
            });
            localStorage.setItem('tickets', JSON.stringify(tickets));

            alert(`✅ Withdraw request of ${amount} ${coin} sent to Admin!`);
            closeWithdrawModal();
        }
    </script>
</body>
</html>
