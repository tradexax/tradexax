<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 16px; padding: 24px; }
        .tab-active { background: #3b82f6; color: white; }
        input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-10 text-center">ADMIN DASHBOARD</h1>
        
        <div class="bg-[#1e2937] p-1 rounded-3xl flex mb-8 overflow-x-auto">
            <button onclick="switchTab(0)" class="tab tab-active flex-1 py-4 rounded-3xl">Dashboard</button>
            <button onclick="switchTab(1)" class="tab flex-1 py-4 rounded-3xl">Users</button>
            <button onclick="switchTab(2)" class="tab flex-1 py-4 rounded-3xl">Wallet</button>
            <button onclick="switchTab(3)" class="tab flex-1 py-4 rounded-3xl">Loans</button>
            <button onclick="switchTab(4)" class="tab flex-1 py-4 rounded-3xl">Tickets</button>
        </div>

        <!-- Wallet Tab -->
        <div id="tab2" class="card">
            <h2 class="text-2xl font-semibold mb-6">Main Wallets (Deposit Addresses)</h2>
            <div class="space-y-6">
                <div>
                    <label>USDT - TRC20</label>
                    <input id="usdt-trc" value="TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR">
                </div>
                <div>
                    <label>USDT - ERC20</label>
                    <input id="usdt-erc" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1">
                </div>
                <div>
                    <label>USDC - TRC20</label>
                    <input id="usdc-trc" value="TXvZ1ZEgcukQUgXeYxUpnX3C5MEEGhFfcR">
                </div>
                <div>
                    <label>USDC - ERC20</label>
                    <input id="usdc-erc" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1">
                </div>
                <div>
                    <label>BTC - Mainnet</label>
                    <input id="btc-main" value="14CDc1TVGMsnAcXFCYXVSPjLNqe4vDMuBp">
                </div>
                <div>
                    <label>ETH - ERC20</label>
                    <input id="eth-erc" value="0xfd52d1bf2bb8d51b17aaacde47e8d55143874de1">
                </div>
            </div>
            <button onclick="saveWallets()" class="mt-8 w-full py-4 bg-blue-600 rounded-3xl">Save All Wallets</button>
        </div>
    </div>

    <script>
        function switchTab(n) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
        }

        function saveWallets() {
            localStorage.setItem('walletUSDT_TRC20', document.getElementById('usdt-trc').value.trim());
            localStorage.setItem('walletUSDT_ERC20', document.getElementById('usdt-erc').value.trim());
            localStorage.setItem('walletUSDC_TRC20', document.getElementById('usdc-trc').value.trim());
            localStorage.setItem('walletUSDC_ERC20', document.getElementById('usdc-erc').value.trim());
            localStorage.setItem('walletBTC', document.getElementById('btc-main').value.trim());
            localStorage.setItem('walletETH', document.getElementById('eth-erc').value.trim());
            alert("✅ Wallets Saved!");
        }

        window.onload = () => {
            switchTab(2);
        };
    </script>
</body>
</html>
