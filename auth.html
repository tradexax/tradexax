<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 16px; padding: 32px; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#111827] border-b border-slate-700 py-5">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <div class="text-3xl font-bold text-blue-400">TradexaX</div>
            <nav class="flex gap-8 text-sm font-medium">
                <a href="index.html">Dashboard</a>
                <a href="trade.html">Trade</a>
                <a href="deposit.html">Deposit</a>
                <a href="withdraw.html">Withdraw</a>
                <a href="auth.html" class="text-blue-400">Account</a>
            </nav>
        </div>
    </header>

    <main class="max-w-md mx-auto p-8 mt-12">
        <div class="card">
            <h1 class="text-3xl font-bold text-center mb-8">Sign in to TradexaX</h1>

            <!-- Phone Login -->
            <div class="mb-10">
                <h2 class="text-xl mb-4">Phone Login (Recommended)</h2>
                <input id="phone" type="tel" value="+85620" 
                       class="w-full bg-gray-800 p-4 rounded-2xl mb-4 text-lg" placeholder="Phone Number">
                
                <button onclick="requestOtp()" 
                        class="w-full bg-blue-600 py-4 rounded-2xl font-bold mb-3">
                    Request OTP
                </button>

                <input id="otp" type="text" maxlength="6" placeholder="Enter 6-digit OTP" 
                       class="w-full bg-gray-800 p-4 rounded-2xl text-lg">
                
                <button onclick="verifyOtp()" 
                        class="w-full bg-emerald-600 py-4 rounded-2xl font-bold mt-3">
                    Verify OTP & Sign In
                </button>
            </div>

            <div class="text-center text-slate-500 my-6">— OR —</div>

            <!-- Email -->
            <div>
                <h2 class="text-xl mb-4">Email Account</h2>
                <input id="email" type="email" placeholder="Email Address" 
                       class="w-full bg-gray-800 p-4 rounded-2xl mb-4">
                <input id="password" type="password" placeholder="Password" 
                       class="w-full bg-gray-800 p-4 rounded-2xl mb-6">
                <button onclick="loginEmail()" 
                        class="w-full bg-purple-600 py-4 rounded-2xl font-bold">
                    Sign In with Email
                </button>
            </div>
        </div>

        <p class="text-center text-slate-500 mt-8 text-sm">
            New user? Account will be created automatically after first successful login.
        </p>
    </main>

    <script>
        function requestOtp() {
            alert("✅ OTP sent to your phone!\n\nFor testing: Use any 6 digits (e.g. 123456)");
        }

        function verifyOtp() {
            alert("✅ Login successful!\nWelcome to TradexaX Trading Platform");
        }

        function loginEmail() {
            alert("✅ Email login successful!\nWelcome back!");
        }
    </script>
</body>
</html>
