<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e2e8f0; }
        .card { background: #1e2937; border-radius: 20px; padding: 32px; }
        video { width: 100%; border-radius: 12px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md mx-4">
        <h1 class="text-4xl font-bold text-center mb-10">TradexaX</h1>

        <div class="flex mb-8 border-b border-slate-700">
            <button onclick="switchTab(0)" id="login-tab" class="flex-1 py-4 tab-active font-medium">Login</button>
            <button onclick="switchTab(1)" id="register-tab" class="flex-1 py-4 font-medium">Register</button>
        </div>

        <!-- Login -->
        <div id="login-form">
            <input id="login-email" type="text" placeholder="Email or Phone" class="w-full bg-slate-800 p-6 rounded-2xl mb-6">
            <input id="login-password" type="password" placeholder="Password" class="w-full bg-slate-800 p-6 rounded-2xl mb-8">
            <button onclick="login()" class="w-full py-6 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-xl font-bold">LOGIN</button>
        </div>

        <!-- Register -->
        <div id="register-form" class="hidden">
            <input id="reg-email" type="text" placeholder="Email" class="w-full bg-slate-800 p-6 rounded-2xl mb-4">
            <input id="reg-phone" type="text" placeholder="Phone (+856)" class="w-full bg-slate-800 p-6 rounded-2xl mb-4">
            <input id="reg-password" type="password" placeholder="Password" class="w-full bg-slate-800 p-6 rounded-2xl mb-6">

            <div class="bg-slate-800 p-6 rounded-2xl mb-8">
                <p class="text-sm text-slate-400 mb-4">KYC Verification (Professional)</p>
                <input id="reg-name" type="text" placeholder="Full Name" class="w-full bg-slate-700 p-5 rounded-2xl mb-4">
                <input id="reg-id" type="text" placeholder="Passport / National ID Number" class="w-full bg-slate-700 p-5 rounded-2xl mb-6">

                <p class="text-sm text-slate-400 mb-3">Upload ID Photo or Take Photo</p>
                <input id="id-photo" type="file" accept="image/*" class="w-full bg-slate-700 p-5 rounded-2xl mb-4">

                <button onclick="startCamera()" class="w-full py-4 bg-slate-700 hover:bg-slate-600 rounded-2xl text-sm flex items-center justify-center gap-2">
                    📷 Take Photo with Camera
                </button>

                <video id="camera" autoplay class="hidden mt-4 w-full rounded-2xl"></video>
                <button onclick="capturePhoto()" id="capture-btn" class="hidden w-full py-4 bg-red-600 hover:bg-red-500 rounded-2xl mt-4">Capture Photo</button>
            </div>

            <button onclick="register()" class="w-full py-6 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-xl font-bold">VERIFY & REGISTER</button>
        </div>

        <p onclick="window.location.href='index.html'" class="text-center text-sm text-slate-400 mt-8 cursor-pointer hover:text-white">Back to Home</p>
    </div>

    <script>
        let stream = null;

        function switchTab(n) {
            document.getElementById('login-form').classList.toggle('hidden', n === 1);
            document.getElementById('register-form').classList.toggle('hidden', n === 0);
            document.getElementById('login-tab').classList.toggle('tab-active', n === 0);
            document.getElementById('register-tab').classList.toggle('tab-active', n === 1);
        }

        function login() {
            const email = document.getElementById('login-email').value;
            if (email) {
                alert("✅ Login successful!");
                window.location.href = 'index.html';
            } else {
                alert("Enter email or phone");
            }
        }

        function startCamera() {
            const video = document.getElementById('camera');
            const captureBtn = document.getElementById('capture-btn');
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(s => {
                    stream = s;
                    video.srcObject = s;
                    video.classList.remove('hidden');
                    captureBtn.classList.remove('hidden');
                })
                .catch(err => alert("Camera access denied or not available"));
        }

        function capturePhoto() {
            const video = document.getElementById('camera');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                const file = new File([blob], "id-photo.jpg", { type: "image/jpeg" });
                const dt = new DataTransfer();
                dt.items.add(file);
                document.getElementById('id-photo').files = dt.files;
                alert("✅ Photo captured and attached!");
                stopCamera();
            });
        }

        function stopCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('camera').classList.add('hidden');
            document.getElementById('capture-btn').classList.add('hidden');
        }

        function register() {
            const email = document.getElementById('reg-email').value;
            const name = document.getElementById('reg-name').value;
            const id = document.getElementById('reg-id').value;
            const photo = document.getElementById('id-photo').files.length > 0;

            if (!email || !name || !id) {
                return alert("Please fill all required fields");
            }

            alert(`✅ KYC Verification Successful!\n\nName: ${name}\nID: ${id}\nPhoto: ${photo ? 'Uploaded' : 'Not uploaded'}\n\nAccount created successfully!`);
            window.location.href = 'index.html';
        }

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
