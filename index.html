<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradexaX</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0f1c] text-white pb-20">
    <header class="bg-[#111827] py-4 px-6 flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <span class="text-3xl">💎</span>
            <h1 class="text-2xl font-bold">TradexaX</h1>
        </div>
        <div id="header-buttons" class="flex items-center gap-6"></div>
    </header>
    <main class="max-w-7xl mx-auto p-6">
        <h1 class="text-5xl font-bold text-center mt-20">Explore the World of Digital Assets!</h1>
        <p class="text-center text-slate-400 mt-4">Trade • Deposit • Withdraw • Loan</p>
        <div class="mt-16">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-semibold">Watchlist</h2>
                <span class="text-emerald-400 cursor-pointer">See All Markets →</span>
            </div>
            <div class="space-y-4" id="watchlist"></div>
        </div>
    </main>
    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#111827] border-t border-slate-700 py-3 flex justify-around text-xs">
        <div onclick="window.location.href='index.html'" class="flex flex-col items-center text-emerald-400">
            📊<br>Markets
        </div>
        <div onclick="window.location.href='trade.html'" class="flex flex-col items-center">
            📉<br>Trade
        </div>
        <div onclick="window.location.href='portfolio.html'" class="flex flex-col items-center">
            💼<br>Portfolio
        </div>
        <div onclick="window.location.href='loan.html'" class="flex flex-col items-center">
            🏦<br>Loan
        </div>
    </div>
    <script>
        const symbols = [
            {name:"Bitcoin", symbol:"BTC", price:"64007.59", change:"-0.29", color:"orange"},
            {name:"Ethereum", symbol:"ETH", price:"3456.78", change:"1.07", color:"blue"},
            {name:"BNB", symbol:"BNB", price:"590.96", change:"0.41", color:"yellow"},
            {name:"Solana", symbol:"SOL", price:"173.69", change:"-0.18", color:"purple"},
            {name:"Gold", symbol:"XAU", price:"2345.80", change:"0.85", color:"amber"},
            {name:"US100", symbol:"NASDAQ", price:"20345", change:"1.2", color:"green"},
            {name:"TRON", symbol:"TRX", price:"0.32", change:"-0.57", color:"red"},
            {name:"Cardano", symbol:"ADA", price:"0.45", change:"2.1", color:"teal"},
            {name:"Ripple", symbol:"XRP", price:"0.58", change:"-1.3", color:"indigo"},
            {name:"Dogecoin", symbol:"DOGE", price:"0.15", change:"3.4", color:"amber"},
            {name:"Avalanche", symbol:"AVAX", price:"28.45", change:"-0.9", color:"sky"},
            {name:"Polygon", symbol:"MATIC", price:"0.67", change:"1.8", color:"violet"},
            {name:"Chainlink", symbol:"LINK", price:"14.23", change:"-2.1", color:"pink"},
            {name:"Litecoin", symbol:"LTC", price:"72.45", change:"0.5", color:"cyan"},
            {name:"Bitcoin Cash", symbol:"BCH", price:"345.67", change:"-1.2", color:"emerald"},
            {name:"Uniswap", symbol:"UNI", price:"7.89", change:"4.3", color:"rose"},
            {name:"Aave", symbol:"AAVE", price:"89.45", change:"-0.8", color:"fuchsia"},
            {name:"Shiba Inu", symbol:"SHIB", price:"0.000023", change:"5.6", color:"amber"}
        ];
        const watchlist = document.getElementById('watchlist');
        symbols.forEach((s, index) => {
            watchlist.innerHTML += `
                <div id="coin-${index}" class="bg-slate-800 p-6 rounded-3xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-${s.color}-500 rounded-full flex items-center justify-center text-xl font-bold">${s.symbol[0]}</div>
                        <div>
                            <div class="font-semibold">${s.name}</div>
                            <div class="text-sm text-slate-400">${s.symbol}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-semibold price" id="price-${index}">$${s.price}</div>
                        <div class="change ${s.change.startsWith('-') ? 'text-red-400' : 'text-emerald-400'}" id="change-${index}">${s.change}%</div>
                    </div>
                </div>
            `;
        });
        // Simulate real-time updates
        setInterval(() => {
            symbols.forEach((s, index) => {
                const priceEl = document.getElementById(`price-${index}`);
                const changeEl = document.getElementById(`change-${index}`);
                const randomChange = (Math.random() * 2 - 1).toFixed(2);
                const newPrice = (parseFloat(s.price) + parseFloat(randomChange)).toFixed(2);
                priceEl.textContent = `$${newPrice}`;
                changeEl.textContent = `${randomChange}%`;
                changeEl.className = `change ${randomChange.startsWith('-') ? 'text-red-400' : 'text-emerald-400'}`;
            });
        }, 5000);
        if (localStorage.getItem('loggedIn') === 'true') {
            document.getElementById('header-buttons').innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <div class="text-xs text-slate-400">ID: 7842</div>
                    </div>
                    <button onclick="logout()" class="px-6 py-2 bg-red-600 rounded-full text-sm">Logout</button>
                </div>
            `;
        } else {
            document.getElementById('header-buttons').innerHTML = `
                <button onclick="window.location.href='auth.html'" class="px-6 py-2 border border-slate-600 rounded-full">Log In</button>
                <button onclick="window.location.href='auth.html'" class="px-6 py-2 bg-yellow-400 text-black rounded-full font-semibold">Sign Up</button>
            `;
        }
        function logout() {
            localStorage.removeItem('loggedIn');
            location.reload();
        }
    </script>
</body>
</html>
